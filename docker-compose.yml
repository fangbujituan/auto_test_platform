networks:
  vplatform_net:
    driver: bridge

services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    networks:
      - vplatform_net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - /opt/vplatform/mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  flask-app:
    build: .
    env_file:
      - .env
    container_name: flask-app
    restart: always
    networks:
      - vplatform_net
    ports:
      - "${BACKEND_PORT}:12048"
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - SECRET_KEY=${SECRET_KEY}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - AI_ENCRYPTION_KEY=${AI_ENCRYPTION_KEY}
      - TZ=Asia/Shanghai
    volumes:
      - /opt/vplatform/unis_auto_platform/logs:/app/logs
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.connect(('127.0.0.1', 12048))"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    build: ./client
    container_name: nginx-frontend
    restart: always
    networks:
      - vplatform_net
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      flask-app:
        condition: service_healthy
